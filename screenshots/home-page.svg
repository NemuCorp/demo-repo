<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#f5f5f5"/>
  <!-- Navbar -->
  <rect x="0" y="0" width="800" height="50" fill="#2c3e50"/>
  <text x="20" y="32" fill="white" font-family="Arial" font-size="18" font-weight="bold">Demo Store</text>
  <text x="600" y="32" fill="white" font-family="Arial" font-size="14">Products</text>
  <text x="680" y="32" fill="white" font-family="Arial" font-size="14">Cart</text>
  <text x="730" y="32" fill="white" font-family="Arial" font-size="14">Login</text>
  <!-- Product Grid -->
  <text x="30" y="90" fill="#333" font-family="Arial" font-size="22" font-weight="bold">Our Products</text>
  <!-- Product cards -->
  <g transform="translate(30, 110)">
    <rect width="230" height="280" rx="8" fill="white" stroke="#ddd"/>
    <rect width="230" height="150" rx="8" fill="#e8ecf0"/>
    <text x="115" y="90" fill="#999" font-family="Arial" font-size="14" text-anchor="middle">Product Image</text>
    <text x="15" y="180" fill="#333" font-family="Arial" font-size="16" font-weight="bold">Wireless Headphones</text>
    <text x="15" y="205" fill="#666" font-family="Arial" font-size="13">Premium noise-cancelling</text>
    <text x="15" y="240" fill="#27ae60" font-family="Arial" font-size="18" font-weight="bold">$99.99</text>
    <text x="170" y="240" fill="#999" font-family="Arial" font-size="12">In Stock: 25</text>
  </g>
  <g transform="translate(285, 110)">
    <rect width="230" height="280" rx="8" fill="white" stroke="#ddd"/>
    <rect width="230" height="150" rx="8" fill="#e8ecf0"/>
    <text x="115" y="90" fill="#999" font-family="Arial" font-size="14" text-anchor="middle">Product Image</text>
    <text x="15" y="180" fill="#333" font-family="Arial" font-size="16" font-weight="bold">Mechanical Keyboard</text>
    <text x="15" y="205" fill="#666" font-family="Arial" font-size="13">RGB backlit, Cherry MX</text>
    <text x="15" y="240" fill="#27ae60" font-family="Arial" font-size="18" font-weight="bold">$149.99</text>
    <text x="170" y="240" fill="#999" font-family="Arial" font-size="12">In Stock: 12</text>
  </g>
  <g transform="translate(540, 110)">
    <rect width="230" height="280" rx="8" fill="white" stroke="#ddd"/>
    <rect width="230" height="150" rx="8" fill="#e8ecf0"/>
    <text x="115" y="90" fill="#999" font-family="Arial" font-size="14" text-anchor="middle">Product Image</text>
    <text x="15" y="180" fill="#333" font-family="Arial" font-size="16" font-weight="bold">USB-C Hub</text>
    <text x="15" y="205" fill="#666" font-family="Arial" font-size="13">7-in-1 multiport adapter</text>
    <text x="15" y="240" fill="#27ae60" font-family="Arial" font-size="18" font-weight="bold">$49.99</text>
    <text x="170" y="240" fill="#999" font-family="Arial" font-size="12">In Stock: 40</text>
  </g>
  <!-- Page indicator -->
  <text x="400" y="430" fill="#999" font-family="Arial" font-size="12" text-anchor="middle">⬤ ○ ○</text>
</svg>
