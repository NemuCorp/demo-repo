<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#f5f5f5"/>
  <!-- Navbar -->
  <rect x="0" y="0" width="800" height="50" fill="#2c3e50"/>
  <text x="20" y="32" fill="white" font-family="Arial" font-size="18" font-weight="bold">Demo Store</text>
  <text x="600" y="32" fill="white" font-family="Arial" font-size="14">Products</text>
  <text x="680" y="32" fill="white" font-family="Arial" font-size="14">Cart</text>
  <text x="740" y="32" fill="white" font-family="Arial" font-size="14">Admin</text>
  <!-- Admin Products -->
  <text x="30" y="90" fill="#333" font-family="Arial" font-size="24" font-weight="bold">Product Management</text>
  <!-- Create Product Form -->
  <rect x="30" y="110" width="350" height="300" rx="8" fill="white" stroke="#ddd"/>
  <text x="50" y="140" fill="#333" font-family="Arial" font-size="18" font-weight="bold">Add New Product</text>
  <text x="50" y="170" fill="#555" font-family="Arial" font-size="12">Name</text>
  <rect x="50" y="178" width="310" height="32" rx="4" fill="white" stroke="#ccc"/>
  <text x="50" y="230" fill="#555" font-family="Arial" font-size="12">Description</text>
  <rect x="50" y="238" width="310" height="60" rx="4" fill="white" stroke="#ccc"/>
  <text x="50" y="318" fill="#555" font-family="Arial" font-size="12">Price</text>
  <rect x="50" y="326" width="120" height="32" rx="4" fill="white" stroke="#ccc"/>
  <text x="185" y="318" fill="#555" font-family="Arial" font-size="12">Stock</text>
  <rect x="185" y="326" width="120" height="32" rx="4" fill="white" stroke="#ccc"/>
  <rect x="50" y="375" width="310" height="35" rx="6" fill="#27ae60"/>
  <text x="205" y="398" fill="white" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Create Product</text>
  <!-- Product List -->
  <text x="420" y="130" fill="#333" font-family="Arial" font-size="16" font-weight="bold">Existing Products</text>
  <!-- Table header -->
  <g transform="translate(420, 145)">
    <rect width="350" height="30" rx="4" fill="#2c3e50"/>
    <text x="10" y="20" fill="white" font-family="Arial" font-size="11" font-weight="bold">Name</text>
    <text x="180" y="20" fill="white" font-family="Arial" font-size="11" font-weight="bold">Price</text>
    <text x="270" y="20" fill="white" font-family="Arial" font-size="11" font-weight="bold">Stock</text>
  </g>
  <!-- Table rows -->
  <g transform="translate(420, 180)">
    <rect width="350" height="30" fill="white" stroke="#eee"/>
    <text x="10" y="20" fill="#333" font-family="Arial" font-size="11">Wireless Headphones</text>
    <text x="180" y="20" fill="#333" font-family="Arial" font-size="11">$99.99</text>
    <text x="270" y="20" fill="#333" font-family="Arial" font-size="11">25</text>
  </g>
  <g transform="translate(420, 212)">
    <rect width="350" height="30" fill="white" stroke="#eee"/>
    <text x="10" y="20" fill="#333" font-family="Arial" font-size="11">Mechanical Keyboard</text>
    <text x="180" y="20" fill="#333" font-family="Arial" font-size="11">$149.99</text>
    <text x="270" y="20" fill="#333" font-family="Arial" font-size="11">12</text>
  </g>
  <g transform="translate(420, 244)">
    <rect width="350" height="30" fill="white" stroke="#eee"/>
    <text x="10" y="20" fill="#333" font-family="Arial" font-size="11">USB-C Hub</text>
    <text x="180" y="20" fill="#333" font-family="Arial" font-size="11">$49.99</text>
    <text x="270" y="20" fill="#333" font-family="Arial" font-size="11">40</text>
  </g>
</svg>
