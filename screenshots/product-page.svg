<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#f5f5f5"/>
  <!-- Navbar -->
  <rect x="0" y="0" width="800" height="50" fill="#2c3e50"/>
  <text x="20" y="32" fill="white" font-family="Arial" font-size="18" font-weight="bold">Demo Store</text>
  <text x="600" y="32" fill="white" font-family="Arial" font-size="14">Products</text>
  <text x="680" y="32" fill="white" font-family="Arial" font-size="14">Cart</text>
  <text x="730" y="32" fill="white" font-family="Arial" font-size="14">Login</text>
  <!-- Product Detail -->
  <g transform="translate(30, 80)">
    <rect width="350" height="350" rx="8" fill="#e8ecf0"/>
    <text x="175" y="180" fill="#999" font-family="Arial" font-size="18" text-anchor="middle">Product Image</text>
  </g>
  <g transform="translate(420, 80)">
    <text x="0" y="0" fill="#333" font-family="Arial" font-size="28" font-weight="bold">Wireless Headphones</text>
    <text x="0" y="40" fill="#27ae60" font-family="Arial" font-size="26" font-weight="bold">$99.99</text>
    <text x="0" y="75" fill="#666" font-family="Arial" font-size="14">Availability: <tspan fill="#27ae60">In Stock (25 available)</tspan></text>
    <rect x="0" y="95" width="100%" height="1" fill="#eee"/>
    <text x="0" y="125" fill="#555" font-family="Arial" font-size="15">Description:</text>
    <text x="0" y="150" fill="#777" font-family="Arial" font-size="14">Premium noise-cancelling wireless headphones</text>
    <text x="0" y="172" fill="#777" font-family="Arial" font-size="14">with 30-hour battery life. Features Bluetooth 5.0</text>
    <text x="0" y="194" fill="#777" font-family="Arial" font-size="14">connectivity, built-in microphone, and foldable</text>
    <text x="0" y="216" fill="#777" font-family="Arial" font-size="14">design for portability.</text>
    <rect x="0" y="245" width="40" height="36" rx="4" fill="white" stroke="#ccc"/>
    <text x="20" y="268" fill="#333" font-family="Arial" font-size="14" text-anchor="middle">1</text>
    <rect x="50" y="245" width="200" height="36" rx="6" fill="#3498db"/>
    <text x="150" y="268" fill="white" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Add to Cart</text>
  </g>
</svg>
