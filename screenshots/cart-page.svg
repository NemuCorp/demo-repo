<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#f5f5f5"/>
  <!-- Navbar -->
  <rect x="0" y="0" width="800" height="50" fill="#2c3e50"/>
  <text x="20" y="32" fill="white" font-family="Arial" font-size="18" font-weight="bold">Demo Store</text>
  <text x="600" y="32" fill="white" font-family="Arial" font-size="14">Products</text>
  <text x="680" y="32" fill="white" font-family="Arial" font-size="14">Cart</text>
  <text x="740" y="32" fill="white" font-family="Arial" font-size="14">Logout</text>
  <!-- Cart -->
  <text x="30" y="90" fill="#333" font-family="Arial" font-size="24" font-weight="bold">Your Shopping Cart</text>
  <!-- Cart items -->
  <g transform="translate(30, 120)">
    <rect width="740" height="100" rx="8" fill="white" stroke="#ddd"/>
    <text x="20" y="35" fill="#333" font-family="Arial" font-size="18" font-weight="bold">Wireless Headphones</text>
    <text x="20" y="60" fill="#27ae60" font-family="Arial" font-size="16">$99.99</text>
    <text x="500" y="40" fill="#666" font-family="Arial" font-size="14">Qty:</text>
    <rect x="540" y="22" width="40" height="30" rx="4" fill="white" stroke="#ccc"/>
    <text x="560" y="42" fill="#333" font-family="Arial" font-size="14" text-anchor="middle">2</text>
    <text x="620" y="40" fill="#333" font-family="Arial" font-size="16" font-weight="bold">$199.98</text>
    <text x="700" y="40" fill="#e74c3c" font-family="Arial" font-size="14" font-weight="bold">Remove</text>
  </g>
  <g transform="translate(30, 240)">
    <rect width="740" height="100" rx="8" fill="white" stroke="#ddd"/>
    <text x="20" y="35" fill="#333" font-family="Arial" font-size="18" font-weight="bold">USB-C Hub</text>
    <text x="20" y="60" fill="#27ae60" font-family="Arial" font-size="16">$49.99</text>
    <text x="500" y="40" fill="#666" font-family="Arial" font-size="14">Qty:</text>
    <rect x="540" y="22" width="40" height="30" rx="4" fill="white" stroke="#ccc"/>
    <text x="560" y="42" fill="#333" font-family="Arial" font-size="14" text-anchor="middle">1</text>
    <text x="620" y="40" fill="#333" font-family="Arial" font-size="16" font-weight="bold">$49.99</text>
    <text x="700" y="40" fill="#e74c3c" font-family="Arial" font-size="14" font-weight="bold">Remove</text>
  </g>
  <!-- Cart Total -->
  <g transform="translate(30, 370)">
    <rect width="740" height="60" rx="8" fill="white" stroke="#ddd"/>
    <text x="540" y="38" fill="#333" font-family="Arial" font-size="20" font-weight="bold">Total: $249.97</text>
  </g>
</svg>
